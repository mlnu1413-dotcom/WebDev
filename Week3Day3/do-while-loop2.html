<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Loops</title>
</head>
<body>
    <h2>JavaScript Loops</h2>
    <p>Example of do while Loop</p>

    <script>
        var i = 11;
        
        do {
            document.write(i + " ");
            console.log(i + " ");
            i++;
        } while (i <= 10);
    </script>
</body>
</html>
