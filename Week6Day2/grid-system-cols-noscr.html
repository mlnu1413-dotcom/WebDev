<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid System Columns No Screen Sizes Demo</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .grid_system div[class^="col"] {
            background-color: #6f42c1;
            color: white;
            padding: 20px;
            text-align: center;
            border: 1px solid #59359a;
            margin: 2px;
        }
        .grid_system .row {
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container mt-4">
        <h1>Bootstrap Grid System Columns No Screen Sizes Demo</h1>
        <p>These columns maintain their width across all viewport sizes using .col class.</p>
        
        <div class="grid_system">
            <!-- Row with equal width columns -->
            <div class="row">
                <div class="col">col</div>
                <div class="col">col</div>
                <div class="col">col</div>
                <div class="col">col</div>
            </div>
            
            <!-- Row with different number of columns -->
            <div class="row">
                <div class="col">col</div>
                <div class="col">col</div>
                <div class="col">col</div>
            </div>
            
            <!-- Row with two columns -->
            <div class="row">
                <div class="col">col</div>
                <div class="col">col</div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
