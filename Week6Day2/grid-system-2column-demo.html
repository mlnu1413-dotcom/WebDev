<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid System 2 Column Demo</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .grid_system div[class^="col"] {
            background-color: #28a745;
            color: white;
            padding: 20px;
            text-align: center;
            border: 1px solid #1e7e34;
            margin: 2px;
        }
        .grid_system .row {
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container mt-4">
        <h1>Bootstrap Grid System 2 Column Demo</h1>
        <p>Resize the browser window to see the responsive behavior.</p>
        
        <div class="grid_system">
            <!-- Row 1: 2 columns of col-sm-6 -->
            <div class="row">
                <div class="col-sm-6">col-sm-6</div>
                <div class="col-sm-6">col-sm-6</div>
            </div>
            
            <!-- Row 2: col-sm-4 and col-sm-8 -->
            <div class="row">
                <div class="col-sm-4">col-sm-4</div>
                <div class="col-sm-8">col-sm-8</div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
