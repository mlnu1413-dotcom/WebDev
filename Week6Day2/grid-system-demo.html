<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid System Demo</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .grid_system div[class^="col"] {
            background-color: #007bff;
            color: white;
            padding: 20px;
            text-align: center;
            border: 1px solid #0056b3;
            margin: 2px;
        }
        .grid_system .row {
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container mt-4">
        <h1>Bootstrap Grid System Demo</h1>
        <p>Resize the browser window to see the responsive behavior.</p>
        
        <div class="grid_system">
            <!-- Row 1: 12 columns of col-sm-1 -->
            <div class="row">
                <div class="col-sm-1">1</div>
                <div class="col-sm-1">2</div>
                <div class="col-sm-1">3</div>
                <div class="col-sm-1">4</div>
                <div class="col-sm-1">5</div>
                <div class="col-sm-1">6</div>
                <div class="col-sm-1">7</div>
                <div class="col-sm-1">8</div>
                <div class="col-sm-1">9</div>
                <div class="col-sm-1">10</div>
                <div class="col-sm-1">11</div>
                <div class="col-sm-1">12</div>
            </div>
            
            <!-- Row 2: 4 columns of col-sm-3 -->
            <div class="row">
                <div class="col-sm-3">col-sm-3</div>
                <div class="col-sm-3">col-sm-3</div>
                <div class="col-sm-3">col-sm-3</div>
                <div class="col-sm-3">col-sm-3</div>
            </div>
            
            <!-- Row 3: 3 columns of col-sm-4 -->
            <div class="row">
                <div class="col-sm-4">col-sm-4</div>
                <div class="col-sm-4">col-sm-4</div>
                <div class="col-sm-4">col-sm-4</div>
            </div>
            
            <!-- Row 4: col-sm-3 and col-sm-6 -->
            <div class="row">
                <div class="col-sm-3">col-sm-3</div>
                <div class="col-sm-6">col-sm-6</div>
            </div>
            
            <!-- Row 5: col-sm-5 and col-sm-7 -->
            <div class="row">
                <div class="col-sm-5">col-sm-5</div>
                <div class="col-sm-7">col-sm-7</div>
            </div>
            
            <!-- Row 6: 2 columns of col-sm-6 -->
            <div class="row">
                <div class="col-sm-6">col-sm-6</div>
                <div class="col-sm-6">col-sm-6</div>
            </div>
            
            <!-- Row 7: 1 column of col-sm-12 -->
            <div class="row">
                <div class="col-sm-12">col-sm-12</div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
